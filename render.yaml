services:
  - type: worker
    name: saikou-watchdog
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python watchdog.py
    envVars:
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: TARGETS
        sync: false
      - key: CHECK_INTERVAL
        value: "60"
