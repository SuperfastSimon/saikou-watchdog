services:
  - type: worker
    name: saikou-watchdog
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python cli.py
    envVars:
      - key: WATCHDOG_TARGETS
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_CHANNEL
        value: "#alerts"
      - key: WATCHDOG_CHECK_INTERVAL
        value: "60"
      - key: WATCHDOG_MAX_RETRIES
        value: "3"
      - key: WATCHDOG_LOG_LEVEL
        value: "INFO"
